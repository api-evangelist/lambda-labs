aid: lambda-labs
name: Lambda
description: Lambda (formerly Lambda Labs) is a GPU cloud provider offering on-demand NVIDIA GPU instances,
  1-Click Clusters of 16-2,000+ interconnected H100 and B200 GPUs, long-term reserved Hyperplane capacity,
  filesystems, firewalls, and SSH key management. Lambda Cloud is accessed via a REST control-plane API,
  the web console, and SDKs/CLI tooling.
