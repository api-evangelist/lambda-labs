- type: Features
  data:
  - name: On-Demand GPU Instances
    description: Self-serve, first-come access to 1x, 2x, 4x, and 8x NVIDIA GPU virtual machines billed
      per-hour with no egress fees.
  - name: 1-Click Clusters
    description: Pre-configured clusters of 16-2,000+ interconnected H100 SXM or B200 GPUs for distributed
      training.
  - name: Hyperplane Reserved Capacity
    description: Long-term reserved GPU clusters sold via direct sales engagement for sustained training
      workloads.
  - name: Lambda Stack
    description: Pre-installed CUDA, cuDNN, PyTorch, and TensorFlow software stack across all Lambda Cloud
      instances.
  - name: Filesystems
    description: Persistent, sharable storage attached to on-demand instances for datasets and checkpoints.
- type: GPUs
  data:
  - name: NVIDIA B200 SXM6
    description: Blackwell-generation flagship GPU, listed at $6.69-$6.99/GPU/hr.
  - name: NVIDIA H100 SXM
    description: 80GB Hopper GPU on SXM, listed at $3.99-$4.29/GPU/hr.
  - name: NVIDIA GH200
    description: Grace Hopper Superchip, listed at $2.29/GPU/hr.
  - name: NVIDIA A100 SXM (80GB)
    description: 80GB Ampere GPU on SXM, listed at $2.79/GPU/hr.
  - name: NVIDIA A100 PCIe (40GB)
    description: 40GB Ampere GPU on PCIe, listed at $1.99/GPU/hr.
  - name: NVIDIA RTX A6000
    description: 48GB Ada/Ampere workstation GPU, listed at $1.09/GPU/hr.
  - name: NVIDIA Tesla V100
    description: 16GB Volta GPU, listed at $0.79/GPU/hr.
- type: Integrations
  data:
  - name: Hugging Face
    description: Reference workflows and templates for serving and training Hugging Face models on Lambda
      Cloud.
  - name: PyTorch
    description: PyTorch ships pre-installed via Lambda Stack on all instances.
  - name: TensorFlow
    description: TensorFlow ships pre-installed via Lambda Stack on all instances.
