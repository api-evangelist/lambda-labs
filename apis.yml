apis:
- aid: lambda-labs:cloud-api
  name: Lambda Cloud API
  description: The Lambda Cloud API is the REST control plane for launching, listing, starting, stopping,
    and terminating GPU instances, managing SSH keys, firewalls, filesystems, images, and instance types.
    It supports on-demand single instances and underpins programmatic access to Lambda's GPU fleet.
  humanURL: https://docs.lambda.ai/api/cloud
  baseURL: https://cloud.lambda.ai/api/v1
  tags:
  - Cloud
  - Compute
  - Filesystems
  - Firewalls
  - GPU
  - Instances
  - REST
  - SSH Keys
  properties:
  - type: Documentation
    url: https://docs.lambda.ai/api/cloud
  - type: Documentation
    url: https://docs.lambda.ai/public-cloud/cloud-api/
- aid: lambda-labs:1-click-clusters
  name: Lambda 1-Click Clusters
  description: Lambda 1-Click Clusters provision interconnected clusters of 16 to 2,000+ NVIDIA H100 SXM
    or B200 GPUs for short-duration distributed training workloads. The product is exposed through the Lambda
    Cloud console and is integrated with the Cloud API surface.
  humanURL: https://docs.lambda.ai/public-cloud/1-click-clusters/
  tags:
  - B200
  - Clusters
  - GPU
  - H100
  - Training
  properties:
  - type: Documentation
    url: https://docs.lambda.ai/public-cloud/1-click-clusters/
- aid: lambda-labs:filesystems
  name: Lambda Cloud Filesystems
  description: Lambda Cloud Filesystems provide persistent, sharable storage attached to on-demand instances
    for datasets and checkpoints. Filesystems are managed through the Cloud API and console.
  humanURL: https://docs.lambda.ai/public-cloud/filesystems/
  tags:
  - Filesystems
  - Persistent Storage
  - Storage
  properties:
  - type: Documentation
    url: https://docs.lambda.ai/public-cloud/filesystems/
- aid: lambda-labs:inference-api
  name: Lambda Inference API
  description: Lambda Inference API is an OpenAI-compatible REST gateway at https://api.lambda.ai/v1 that
    serves hosted open-source language models (Llama, DeepSeek, Hermes, Qwen, and others) behind the standard
    OpenAI Chat Completions surface. Chat completion responses can be streamed as HTTP Server-Sent Events
    by setting "stream":true on the POST /chat/completions request body; the SSE stream emits
    chat.completion.chunk events terminated by a data [DONE] sentinel. As of 2026-05-29 Lambda has announced
    the Inference API is winding down in favor of customer self-hosted deployments on Lambda GPU instances.
  humanURL: https://docs.lambda.ai/public-cloud/lambda-inference-api/
  baseURL: https://api.lambda.ai/v1
  tags:
  - AI
  - Chat
  - Completions
  - Inference
  - LLM
  - OpenAI Compatible
  - SSE
  - Streaming
  properties:
  - type: Documentation
    url: https://docs.lambda.ai/public-cloud/lambda-inference-api/
  - type: Documentation
    url: https://lambda.ai/inference
  - type: AsyncAPI
    url: asyncapi/lambda-labs-asyncapi.yml
